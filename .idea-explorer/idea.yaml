idea:
  title: The Residual Stream After Bijective Token Transformation
  domain: nlp
  hypothesis: 'Applying a bijective transformation that shuffles token-surface form
    mappings to the input of a language model will initially confuse the model, but
    after sufficient exposure, the model may adapt such that its residual stream representations
    become similar to normal, modulo the shuffle. Alternatively, the model may never
    fully recover due to embedding misalignment.

    '
  background:
    description: 'Let''s say we have a bijection f from V -> V, that essentially shuffles
      which tokens represent which surface forms. If we feed this into a normal LM,
      it will likely have no idea what''s going on for the first few words, helplessly
      trying to interpret them normally. Then it will likely represent the shuffle
      as it attunes to the code. After a lot of text, will the residual stream look
      kind of normal, modulo the shuffle? Or will the model never recover because
      its embeddings don''t get remapped properly?

      '
  metadata:
